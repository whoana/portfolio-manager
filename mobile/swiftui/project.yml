name: ETFPortfolioManager
options:
  bundleIdPrefix: com.etfportfolio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  ETFPortfolioManager:
    type: application
    platform: iOS
    sources:
      - ETFPortfolioManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.etfportfolio.manager
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_GENERATION: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Face ID로 앱을 잠금 해제합니다."
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

  ETFPortfolioManagerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: ETFPortfolioManager
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  ETFPortfolioManagerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: ETFPortfolioManager
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
